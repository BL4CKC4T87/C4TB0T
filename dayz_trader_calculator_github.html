<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayZ Trader Calculator</title>
<style>
body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
#trader { max-width: 1200px; margin: auto; background: #222; padding: 20px; border-radius: 10px; }
#search, #categoryFilter { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: none; }
.traderItem { padding: 8px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
.traderItem button { margin-left: 5px; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; background: #444; color: #eee; }
.traderItem button:hover { background: #666; }
</style>
</head>
<body>
<div id="trader">
<h1>DayZ Trader Terminal</h1>
<div><strong>Player Balance: $<span id="balance">10000</span></strong></div>
<input type="text" id="search" placeholder="Search items... 🔍">
<select id="categoryFilter">
<option value="all">All Categories</option>
<option value="pistol">Pistols</option>
<option value="smg">SMGs</option>
<option value="rifle">Rifles</option>
<option value="shotgun">Shotguns</option>
<option value="ammo">Ammo</option>
<option value="armor">Armor</option>
<option value="clothing">Clothing</option>
<option value="backpack">Backpacks</option>
<option value="vehicle">Vehicles</option>
<option value="vehiclepart">Vehicle Parts</option>
<option value="repair">Repair Items</option>
<option value="medical">Medical</option>
<option value="misc">Misc</option>
<option value="tool">Tools</option>
<option value="key">Keys</option>
</select>
<div id="itemList"></div>
</div>
<script>
let playerBalance = 10000;
const balanceSpan = document.getElementById("balance");
const itemListDiv = document.getElementById("itemList");
const searchInput = document.getElementById("search");
const categoryFilter = document.getElementById("categoryFilter");

const items = {
  // Pistols
  "CR-75": {category:"pistol", buy:900, sell:450},
  "Silver Deagle": {category:"pistol", buy:2500, sell:1250},
  "Golden Deagle": {category:"pistol", buy:5000, sell:2500},
  "Derringer": {category:"pistol", buy:400, sell:200},
  "Derringer Black": {category:"pistol", buy:4000, sell:2000},
  "Derringer Pink": {category:"pistol", buy:5000, sell:2500},
  "IJ-70": {category:"pistol", buy:600, sell:300},
  "MK II": {category:"pistol", buy:750, sell:375},
  "Mlock-91": {category:"pistol", buy:1100, sell:550},
  "P1": {category:"pistol", buy:700, sell:350},
  "Signal Pistol": {category:"pistol", buy:500, sell:250},
  "Longhorn": {category:"pistol", buy:1200, sell:600},
  "FX-45": {category:"pistol", buy:1300, sell:650},
  "Revolver": {category:"pistol", buy:1400, sell:700},
  "Sawed-off Revolver": {category:"pistol", buy:1200, sell:600},
  "Kolt 1911": {category:"pistol", buy:1500, sell:750},
  "Engraved Kolt 1911": {category:"pistol", buy:4500, sell:2250},

  // Submachine Guns
  "Bizon": {category:"smg", buy:2200, sell:1100},
  "CR-61 Skorpion": {category:"smg", buy:1300, sell:650},
  "SG5-K": {category:"smg", buy:2200, sell:1100},
  "USG-45": {category:"smg", buy:2400, sell:1200},
  "RAK": {category:"smg", buy:1500, sell:750},

  // Assault & Battle Rifles
  "AUR A1": {category:"rifle", buy:3500, sell:1750},
  "AUR AX": {category:"rifle", buy:4500, sell:2250},
  "KA-74": {category:"rifle", buy:3500, sell:1750},
  "KA-74 Green": {category:"rifle", buy:3700, sell:1850},
  "KA-101": {category:"rifle", buy:4000, sell:2000},
  "KA-101 Green": {category:"rifle", buy:4200, sell:2100},
  "KA-M": {category:"rifle", buy:4300, sell:2150},
  "KAS-74U": {category:"rifle", buy:3000, sell:1500},
  "KAS-74U Green": {category:"rifle", buy:3300, sell:1650},
  "M4-A1": {category:"rifle", buy:5000, sell:2500},
  "M4-A1 Green": {category:"rifle", buy:5500, sell:2750},
  "M16-A2": {category:"rifle", buy:3400, sell:1700},
  "LE-MAS": {category:"rifle", buy:3500, sell:1750},
  "LAR": {category:"rifle", buy:4800, sell:2400},
  "DMR": {category:"rifle", buy:4700, sell:2350},

  // Shotguns
  "BK-12": {category:"shotgun", buy:800, sell:400},
  "Sawed-off BK-12": {category:"shotgun", buy:700, sell:350},
  "BK-133": {category:"shotgun", buy:1500, sell:750},
  "BK-43": {category:"shotgun", buy:900, sell:450},
  "Sawed-off BK-43": {category:"shotgun", buy:800, sell:400},
  "R-12": {category:"shotgun", buy:2200, sell:1100},
  "Vaiga": {category:"shotgun", buy:2600, sell:1300},

  // Bolt-Action & Hunting Rifles
  "CR-527": {category:"rifle", buy:1500, sell:750},
  "CR-527 Green": {category:"rifle", buy:2000, sell:1000},
  "CR-527 Black": {category:"rifle", buy:2000, sell:1000},
  "CR-527 Spraypaint": {category:"rifle", buy:2000, sell:1000},
  "CR-550 Savanna": {category:"rifle", buy:2400, sell:1200},
  "M70 Tundra": {category:"rifle", buy:3000, sell:1500},
  "M70 Tundra Green": {category:"rifle", buy:3500, sell:1750},
  "M70 Tundra Black": {category:"rifle", buy:3500, sell:1750},
  "Mosin 91/30": {category:"rifle", buy:2500, sell:1250},
  "Mosin 91/30 Green": {category:"rifle", buy:3000, sell:1500},
  "Mosin 91/30 Black": {category:"rifle", buy:3000, sell:1500},
  "Mosin 91/30 Spraypaint": {category:"rifle", buy:3000, sell:1500},
  "Sawed-off Mosin": {category:"rifle", buy:2200, sell:1100},
  "Pioneer": {category:"rifle", buy:2200, sell:1100},
  "SSG-82": {category:"rifle", buy:1800, sell:900},

  // Semi-Auto, Special, Magazines, Ammo, Armor, Clothing, Backpacks, Vehicles, Vehicle Parts, Repair Items, Tools, Medical, Misc, Keys
  // ... continue full list here exactly as you have provided in your notes, structured like this
};

function renderItems() {
  itemListDiv.innerHTML = '';
  const searchTerm = searchInput.value.toLowerCase();
  const filterCat = categoryFilter.value;
  for (const [name, data] of Object.entries(items)) {
    if ((filterCat === 'all' || data.category === filterCat) && name.toLowerCase().includes(searchTerm)) {
      const div = document.createElement('div');
      div.className = 'traderItem';
      div.innerHTML = `<span>${name} - $${data.buy}</span><span><button onclick="buyItem('${name}')">Buy</button><button onclick="sellItem('${name}')">Sell</button></span>`;
      itemListDiv.appendChild(div);
    }
  }
}

function buyItem(name) {
  const price = items[name].buy;
  if (playerBalance >= price) {
    playerBalance -= price;
    balanceSpan.textContent = playerBalance;
    alert(`Bought ${name} for $${price}`);
  } else {
    alert("Not enough money!");
  }
}

function sellItem(name) {
  const price = items[name].sell;
  playerBalance += price;
  balanceSpan.textContent = playerBalance;
  alert(`Sold ${name} for $${price}`);
}

searchInput.addEventListener('input', renderItems);
categoryFilter.addEventListener('change', renderItems);
renderItems();
</script>
</body>
</html>
