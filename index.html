<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayZ Trader Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1e2420;
    --surface: #272e29;
    --surface2: #303830;
    --border: #4a5e48;
    --accent-buy: #f87171;
    --accent-sell: #4ade80;
    --accent-buy-dim: #5b1a1a;
    --accent-sell-dim: #16532d;
    --text: #edfae8;
    --text-dim: #94b08e;
    --text-mid: #bcd8b4;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, #3a4a3866 39px, #3a4a3866 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #3a4a3866 39px, #3a4a3866 40px);
  }

  #app {
    max-width: 900px;
    margin: auto;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
    padding-bottom: 26px;
    padding-top: 10px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .header-bg {
    position: absolute;
    right: 120px;
    top: 50%;
    transform: translateY(-50%);
    width: 190px;
    height: 190px;
    object-fit: contain;
    opacity: 0.32;
    pointer-events: none;
    filter: brightness(1.3);
    z-index: 0;
  }

  .header-title, .balance-box {
    position: relative;
    z-index: 1;
  }

  .header-title h1 {
    font-family: var(--mono);
    font-size: 24px;
    letter-spacing: 3px;
    color: #4ade80;
    text-transform: uppercase;
  }

  .header-title p {
    font-size: 13px;
    color: var(--text-dim);
    font-family: var(--mono);
    letter-spacing: 2px;
    margin-top: 3px;
  }

  .header-title .header-desc {
    font-size: 13px;
    color: var(--text-mid);
    font-family: var(--mono);
    letter-spacing: 1px;
    margin-top: 6px;
    line-height: 1.7;
  }

  .header-title .header-catfood {
    font-size: 13px;
    color: #4ade80;
    font-family: var(--mono);
    letter-spacing: 1px;
    margin-top: 2px;
    opacity: 0.7;
  }

  /* Balance */
  .balance-box {
    text-align: right;
  }

  .balance-label {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .balance-amount {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 700;
    transition: color 0.3s;
  }

  .balance-amount.positive { color: var(--accent-sell); }
  .balance-amount.negative { color: var(--accent-buy); }
  .balance-amount.zero { color: var(--text-dim); }

  .balance-reset {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 3px 10px;
    border-radius: 3px;
    cursor: pointer;
    margin-top: 6px;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .balance-reset:hover { border-color: var(--text-mid); color: var(--text-mid); }

  /* Toggle */
  .mode-toggle {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 12px;
    width: fit-content;
    gap: 3px;
  }

  .toggle-btn {
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 28px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: transparent;
    color: var(--text-dim);
    transition: all 0.25s;
  }

  .toggle-btn.active-buy {
    background: var(--accent-buy-dim);
    color: var(--accent-buy);
    box-shadow: 0 0 12px #4ade8033;
  }

  .toggle-btn.active-sell {
    background: var(--accent-sell-dim);
    color: var(--accent-sell);
    box-shadow: 0 0 12px #f8717133;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .controls input, .controls select {
    font-family: var(--mono);
    font-size: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 5px;
    outline: none;
    transition: border-color 0.2s;
  }

  .controls input { flex: 1; }
  .controls select { min-width: 160px; }
  .controls input:focus, .controls select:focus { border-color: var(--text-mid); }
  .controls input::placeholder { color: var(--text-dim); }

  /* Item list */
  #itemList {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .list-header {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 16px;
    padding: 10px 16px;
    background: var(--surface2);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  .traderItem {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 16px;
    align-items: center;
    padding: 7px 16px;
    border-bottom: 1px solid #1a1e1b;
    transition: background 0.15s;
  }

  .traderItem:last-child { border-bottom: none; }
  .traderItem:hover { background: var(--surface2); }

  .item-name {
    font-family: var(--display);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .item-category {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .item-price {
    font-family: var(--mono);
    font-size: 13px;
    text-align: right;
    min-width: 80px;
  }

  .item-price.buy-price { color: var(--accent-buy); }
  .item-price.sell-price { color: var(--accent-sell); }

  .action-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 72px;
  }

  .buy-btn {
    background: var(--accent-buy-dim);
    color: var(--accent-buy);
    border: 1px solid #6b2a2a;
  }

  .buy-btn:hover {
    background: #1c6b33;
    box-shadow: 0 0 8px #4ade8044;
  }

  .sell-btn {
    background: var(--accent-sell-dim);
    color: var(--accent-sell);
    border: 1px solid #2a6b3a;
  }

  .sell-btn:hover {
    background: #1c6b33;
    box-shadow: 0 0 8px #4ade8044;
  }

  /* Log */
  .log-section {
    margin-top: 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .log-header {
    padding: 10px 16px;
    background: var(--surface2);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .log-clear {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: color 0.2s;
  }

  .log-clear:hover { color: var(--accent-sell); }

  #transactionLog {
    max-height: 160px;
    overflow-y: auto;
    padding: 8px 0;
  }

  .log-entry {
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 16px;
    display: flex;
    justify-content: space-between;
    color: var(--text-mid);
    border-bottom: 1px solid #1a1e1b11;
  }

  .log-entry .log-buy { color: var(--accent-buy); }
  .log-entry .log-sell { color: var(--accent-sell); }

  .empty-log {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    padding: 16px;
    text-align: center;
    letter-spacing: 1px;
  }

  .no-results {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    padding: 24px;
    text-align: center;
    letter-spacing: 1px;
  }

  /* Invoice button */
  .invoice-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.2s;
  }
  .invoice-btn:hover { border-color: var(--text-mid); color: var(--text); }

  /* Modal overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000000cc;
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 540px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 14px; right: 16px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--accent-sell); }

  .invoice-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
    margin-bottom: 14px;
  }

  .invoice-title {
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--accent-buy);
    text-transform: uppercase;
  }

  .invoice-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .invoice-section-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    margin-top: 14px;
  }

  .invoice-row {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 0;
    border-bottom: 1px solid #1a1e1b;
    color: var(--text-mid);
  }

  .invoice-row .inv-buy { color: var(--accent-buy); }
  .invoice-row .inv-sell { color: var(--accent-sell); }

  .invoice-total {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    padding-top: 12px;
    margin-top: 4px;
    border-top: 1px solid var(--border);
  }

  .invoice-actions {
    display: flex;
    gap: 8px;
    margin-top: 18px;
  }

  .inv-action-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
  }

  .inv-copy-btn {
    background: var(--accent-buy-dim);
    color: var(--accent-buy);
    border: 1px solid #2a6b3a;
  }
  .inv-copy-btn:hover { background: #1c6b33; }

  .inv-close-btn {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .inv-close-btn:hover { border-color: var(--text-mid); color: var(--text-mid); }

  .copy-toast {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent-buy);
    text-align: center;
    margin-top: 8px;
    height: 16px;
    letter-spacing: 1px;
    transition: opacity 0.3s;
  }

  /* Easter egg */
  .easter-egg {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.75);
    animation: eggFadeIn 0.3s ease;
  }
  .easter-egg.show { display: flex; }
  .easter-egg img {
    width: min(480px, 85vw);
    border-radius: 16px;
    animation: eggPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 60px #4ade8066, 0 0 120px #4ade8022;
  }
  @keyframes eggFadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes eggPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>

function formatBalance(val) {
  const abs = Math.abs(val);
  return (val < 0 ? '-$' : '$') + abs.toLocaleString();
}

function updateBalanceDisplay() {
  const el = document.getElementById('balanceDisplay');
  el.textContent = formatBalance(playerBalance);
  el.className = 'balance-amount ' + (playerBalance > 0 ? 'positive' : playerBalance < 0 ? 'negative' : 'zero');
}

function resetBalance() {
  playerBalance = 0;
  updateBalanceDisplay();
}

function getCSTTime() {
  const now = new Date();
  const cst = new Date(now.toLocaleString('en-US', {timeZone: 'America/Chicago'}));
  const dateStr = cst.toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'});
  const timeStr = cst.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:false});
  return {dateStr, timeStr};
}

function getCSTTimeShort() {
  const now = new Date();
  return new Date(now.toLocaleString('en-US', {timeZone: 'America/Chicago'}))
    .toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
}

function setMode(m) {
  mode = m;
  document.getElementById('buyToggle').className = 'toggle-btn' + (m === 'buy' ? ' active-buy' : '');
  document.getElementById('sellToggle').className = 'toggle-btn' + (m === 'sell' ? ' active-sell' : '');
  renderItems();
}

function addLog(name, type, amount) {
  const time = getCSTTimeShort();
  log.unshift({name, type, amount, time});
  renderLog();
}

function renderLog() {
  const el = document.getElementById('transactionLog');
  if (log.length === 0) {
    el.innerHTML = '<div class="empty-log">// no transactions yet</div>';
    return;
  }
  el.innerHTML = log.map(e => `
    <div class="log-entry">
      <span>[${e.time}] <span class="log-${e.type}">${e.type.toUpperCase()}</span> · ${e.name}</span>
      <span class="log-${e.type}">${e.type === 'buy' ? '-' : '+'}$${e.amount.toLocaleString()}</span>
    </div>
  `).join('');
}

function clearLog() {
  log = [];
  playerBalance = 0;
  updateBalanceDisplay();
  renderLog();
}


let catfoodSellCount = 0;

function playHappyRoboMeow() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    // Happy ascending chirps - more notes, higher pitch, longer
    const notes = [
      { time: 0,    freq: 600,  dur: 0.18 },
      { time: 0.12, freq: 750,  dur: 0.18 },
      { time: 0.24, freq: 900,  dur: 0.22 },
      { time: 0.40, freq: 820,  dur: 0.15 },
      { time: 0.52, freq: 1050, dur: 0.28 },
      { time: 0.75, freq: 1200, dur: 0.35 },
    ];

    notes.forEach(note => {
      const osc = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const gain = ctx.createGain();
      const distortion = ctx.createWaveShaper();

      const curve = new Float32Array(256);
      for (let j = 0; j < 256; j++) {
        const x = (j * 2) / 256 - 1;
        curve[j] = (Math.PI + 80) * x / (Math.PI + 80 * Math.abs(x));
      }
      distortion.curve = curve;

      osc.connect(distortion);
      osc2.connect(distortion);
      distortion.connect(gain);
      gain.connect(ctx.destination);

      // Two oscillators slightly detuned for richness
      osc.type = 'sawtooth';
      osc2.type = 'square';
      osc.frequency.setValueAtTime(note.freq, ctx.currentTime + note.time);
      osc.frequency.exponentialRampToValueAtTime(note.freq * 1.3, ctx.currentTime + note.time + note.dur * 0.6);
      osc.frequency.exponentialRampToValueAtTime(note.freq * 1.1, ctx.currentTime + note.time + note.dur);
      osc2.frequency.setValueAtTime(note.freq * 1.01, ctx.currentTime + note.time);
      osc2.frequency.exponentialRampToValueAtTime(note.freq * 1.31, ctx.currentTime + note.time + note.dur);

      gain.gain.setValueAtTime(0, ctx.currentTime + note.time);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + note.time + 0.02);
      gain.gain.setValueAtTime(0.18, ctx.currentTime + note.time + note.dur * 0.7);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + note.time + note.dur);

      osc.start(ctx.currentTime + note.time);
      osc.stop(ctx.currentTime + note.time + note.dur + 0.05);
      osc2.start(ctx.currentTime + note.time);
      osc2.stop(ctx.currentTime + note.time + note.dur + 0.05);
    });
  } catch(e) {}
}

function triggerEasterEgg() {
  playHappyRoboMeow();
  const el = document.getElementById('easterEgg');
  el.classList.add('show');
  setTimeout(() => { el.classList.remove('show'); }, 5000);
}

function playRoboMeow() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const times = [0, 0.08, 0.18];
    const freqs = [520, 480, 580];

    times.forEach((startTime, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const distortion = ctx.createWaveShaper();

      // Waveshaper for robotic buzz
      const curve = new Float32Array(256);
      for (let j = 0; j < 256; j++) {
        const x = (j * 2) / 256 - 1;
        curve[j] = (Math.PI + 120) * x / (Math.PI + 120 * Math.abs(x));
      }
      distortion.curve = curve;

      osc.connect(distortion);
      distortion.connect(gain);
      gain.connect(ctx.destination);

      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freqs[i], ctx.currentTime + startTime);
      osc.frequency.exponentialRampToValueAtTime(freqs[i] * 0.7, ctx.currentTime + startTime + 0.12);

      gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
      gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + startTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startTime + 0.14);

      osc.start(ctx.currentTime + startTime);
      osc.stop(ctx.currentTime + startTime + 0.15);
    });
  } catch(e) {}
}

function doTransaction(name) {
  playRoboMeow();
  const item = items[name];
  if (mode === 'buy') {
    if (item.buy === null) return;
    playerBalance -= item.buy;
    addLog(name, 'buy', item.buy);
  } else {
    playerBalance += item.sell;
    addLog(name, 'sell', item.sell);
    if (name === 'Catfood') { catfoodSellCount++; if (catfoodSellCount >= 5) { catfoodSellCount = 0; triggerEasterEgg(); } }
  }
  updateBalanceDisplay();
}

function renderItems() {
  const searchTerm = document.getElementById('search').value.toLowerCase().trim();
  const searchWords = searchTerm.split(/\s+/).filter(w => w.length > 0);
  const filterCat = document.getElementById('categoryFilter').value;
  const isBuy = mode === 'buy';

  if (!filterCat && !searchTerm) {
    document.getElementById('itemList').innerHTML = `
      <div style="border:1px solid var(--border);border-radius:8px;">
        <div style="font-family:var(--mono);font-size:12px;color:var(--text-dim);padding:32px;text-align:center;letter-spacing:2px;line-height:2;">
          // SELECT A CATEGORY ABOVE<br>
          <span style="font-size:10px;color:var(--text-dim);opacity:0.6;">or search for an item by name</span>
        </div>
      </div>`;
    return;
  }

  const filtered = Object.entries(items).filter(([name, data]) => {
    if (searchWords.length > 0) {
      const nameLower = name.toLowerCase();
      return searchWords.every(word => nameLower.includes(word));
    }
    if (filterCat !== 'all' && filterCat !== '') return data.category === filterCat;
    return true;
  });

  if (filtered.length === 0) {
    document.getElementById('itemList').innerHTML = `
      <div style="border:1px solid var(--border);border-radius:8px;">
        <div class="no-results">// no items found</div>
      </div>`;
    return;
  }

  const rows = filtered.map(([name, data]) => {
    const isSellOnly = data.buy === null;
    const price = isBuy ? data.buy : data.sell;
    const displayPrice = isBuy && isSellOnly ? '—' : `$${price.toLocaleString()}`;
    const btnDisabled = isBuy && isSellOnly;
    return `
    <div class="traderItem">
      <div>
        <div class="item-name">${name}${isSellOnly ? ' <span style="font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:1px;">SELL ONLY</span>' : ''}</div>
        <div class="item-category">${data.category}</div>
      </div>
      <div class="item-price ${isBuy ? 'buy-price' : 'sell-price'}" style="${btnDisabled ? 'color:var(--text-dim)' : ''}">
        ${displayPrice}
      </div>
      <button class="action-btn ${isBuy ? 'buy-btn' : 'sell-btn'}" onclick="doTransaction('${name}')" ${btnDisabled ? 'disabled style="opacity:0.3;cursor:not-allowed;"' : ''}>
        ${isBuy ? '▼ BUY' : '▲ SELL'}
      </button>
    </div>
  `}).join('');

  document.getElementById('itemList').innerHTML = `
    <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;">
      <div class="list-header">
        <span>Item</span>
        <span>${isBuy ? 'Buy Price' : 'Sell Price'}</span>
        <span>Action</span>
      </div>
      ${rows}
    </div>`;
}

function openInvoice() {
  if (log.length === 0) {
    alert('No transactions to invoice yet.');
    return;
  }

  const {dateStr, timeStr} = getCSTTime();
  const playerTag = document.getElementById('playerTag').value.trim() || 'Unknown';

  document.getElementById('invoiceMeta').innerHTML =
    `Player: <span style="color:var(--text)">${playerTag}</span> &nbsp;·&nbsp; ${dateStr} at ${timeStr} CST`;

  const ordered = [...log].reverse();
  document.getElementById('invoiceRows').innerHTML = ordered.map(e => `
    <div class="invoice-row">
      <span>[${e.time}] <span class="inv-${e.type}">${e.type.toUpperCase()}</span> · ${e.name}</span>
      <span class="inv-${e.type}">${e.type === 'buy' ? '-' : '+'}$${e.amount.toLocaleString()}</span>
    </div>
  `).join('');

  const totalEl = document.getElementById('invoiceTotalAmt');
  totalEl.textContent = formatBalance(playerBalance);
  totalEl.style.color = playerBalance > 0 ? 'var(--accent-buy)' : playerBalance < 0 ? 'var(--accent-sell)' : 'var(--text-dim)';

  document.getElementById('invoiceModal').classList.add('open');
}

function closeInvoice() {
  document.getElementById('invoiceModal').classList.remove('open');
}

function copyInvoice() {
  const {dateStr, timeStr} = getCSTTime();
  const playerTag = document.getElementById('playerTag').value.trim() || 'Unknown';

  const ordered = [...log].reverse();
  const lines = [
    '// C4TB0T INVOICE — Anarchy++',
    `Player: ${playerTag}`,
    `Generated: ${dateStr} at ${timeStr} CST`,
    '─'.repeat(40),
    ...ordered.map(e => {
      const sign = e.type === 'buy' ? '-' : '+';
      return `[${e.time}] ${e.type.toUpperCase().padEnd(4)} · ${e.name.padEnd(24)} ${sign}$${e.amount.toLocaleString()}`;
    }),
    '─'.repeat(40),
    `NET BALANCE: ${formatBalance(playerBalance)}`,
  ];

  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const toast = document.getElementById('copyToast');
    toast.textContent = '// copied to clipboard';
    setTimeout(() => { toast.textContent = ''; }, 2500);
  });
}

// Close modal on overlay click
document.getElementById('invoiceModal').addEventListener('click', function(e) {
  if (e.target === this) closeInvoice();
});


document.getElementById('search').addEventListener('input', renderItems);
document.getElementById('categoryFilter').addEventListener('change', function() {
  document.getElementById('search').value = '';
  renderItems();
});

updateBalanceDisplay();
renderItems();
</script>
