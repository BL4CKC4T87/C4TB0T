<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayZ Trader Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #131614;
    --surface2: #1a1e1b;
    --border: #2a3028;
    --accent-buy: #4ade80;
    --accent-sell: #f87171;
    --accent-buy-dim: #16532d;
    --accent-sell-dim: #5b1a1a;
    --text: #d4e8d0;
    --text-dim: #5a6e57;
    --text-mid: #8aaa84;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1e1b44 39px, #1a1e1b44 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #1a1e1b44 39px, #1a1e1b44 40px);
  }

  #app {
    max-width: 900px;
    margin: auto;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .header-title h1 {
    font-family: var(--mono);
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--accent-buy);
    text-transform: uppercase;
  }

  .header-title p {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--mono);
    letter-spacing: 2px;
    margin-top: 3px;
  }

  /* Balance */
  .balance-box {
    text-align: right;
  }

  .balance-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .balance-amount {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 700;
    transition: color 0.3s;
  }

  .balance-amount.positive { color: var(--accent-buy); }
  .balance-amount.negative { color: var(--accent-sell); }
  .balance-amount.zero { color: var(--text-dim); }

  .balance-reset {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 3px 10px;
    border-radius: 3px;
    cursor: pointer;
    margin-top: 6px;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .balance-reset:hover { border-color: var(--text-mid); color: var(--text-mid); }

  /* Toggle */
  .mode-toggle {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 12px;
    width: fit-content;
    gap: 3px;
  }

  .toggle-btn {
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 28px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: transparent;
    color: var(--text-dim);
    transition: all 0.25s;
  }

  .toggle-btn.active-buy {
    background: var(--accent-buy-dim);
    color: var(--accent-buy);
    box-shadow: 0 0 12px #4ade8033;
  }

  .toggle-btn.active-sell {
    background: var(--accent-sell-dim);
    color: var(--accent-sell);
    box-shadow: 0 0 12px #f8717133;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .controls input, .controls select {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 5px;
    outline: none;
    transition: border-color 0.2s;
  }

  .controls input { flex: 1; }
  .controls select { min-width: 160px; }
  .controls input:focus, .controls select:focus { border-color: var(--text-mid); }
  .controls input::placeholder { color: var(--text-dim); }

  /* Item list */
  #itemList {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .list-header {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 16px;
    padding: 10px 16px;
    background: var(--surface2);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  .traderItem {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 16px;
    align-items: center;
    padding: 7px 16px;
    border-bottom: 1px solid #1a1e1b;
    transition: background 0.15s;
  }

  .traderItem:last-child { border-bottom: none; }
  .traderItem:hover { background: var(--surface2); }

  .item-name {
    font-family: var(--display);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .item-category {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .item-price {
    font-family: var(--mono);
    font-size: 13px;
    text-align: right;
    min-width: 80px;
  }

  .item-price.buy-price { color: var(--accent-buy); }
  .item-price.sell-price { color: var(--accent-sell); }

  .action-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 72px;
  }

  .buy-btn {
    background: var(--accent-buy-dim);
    color: var(--accent-buy);
    border: 1px solid #2a6b3a;
  }

  .buy-btn:hover {
    background: #1c6b33;
    box-shadow: 0 0 8px #4ade8044;
  }

  .sell-btn {
    background: var(--accent-sell-dim);
    color: var(--accent-sell);
    border: 1px solid #6b2a2a;
  }

  .sell-btn:hover {
    background: #6b2020;
    box-shadow: 0 0 8px #f8717144;
  }

  /* Log */
  .log-section {
    margin-top: 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .log-header {
    padding: 10px 16px;
    background: var(--surface2);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .log-clear {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: color 0.2s;
  }

  .log-clear:hover { color: var(--accent-sell); }

  #transactionLog {
    max-height: 160px;
    overflow-y: auto;
    padding: 8px 0;
  }

  .log-entry {
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 16px;
    display: flex;
    justify-content: space-between;
    color: var(--text-mid);
    border-bottom: 1px solid #1a1e1b11;
  }

  .log-entry .log-buy { color: var(--accent-buy); }
  .log-entry .log-sell { color: var(--accent-sell); }

  .empty-log {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    padding: 16px;
    text-align: center;
    letter-spacing: 1px;
  }

  .no-results {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    padding: 24px;
    text-align: center;
    letter-spacing: 1px;
  }

  /* Invoice button */
  .invoice-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.2s;
  }
  .invoice-btn:hover { border-color: var(--text-mid); color: var(--text); }

  /* Modal overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000000cc;
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 540px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 14px; right: 16px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--accent-sell); }

  .invoice-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
    margin-bottom: 14px;
  }

  .invoice-title {
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--accent-buy);
    text-transform: uppercase;
  }

  .invoice-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .invoice-section-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    margin-top: 14px;
  }

  .invoice-row {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 0;
    border-bottom: 1px solid #1a1e1b;
    color: var(--text-mid);
  }

  .invoice-row .inv-buy { color: var(--accent-buy); }
  .invoice-row .inv-sell { color: var(--accent-sell); }

  .invoice-total {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    padding-top: 12px;
    margin-top: 4px;
    border-top: 1px solid var(--border);
  }

  .invoice-actions {
    display: flex;
    gap: 8px;
    margin-top: 18px;
  }

  .inv-action-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
  }

  .inv-copy-btn {
    background: var(--accent-buy-dim);
    color: var(--accent-buy);
    border: 1px solid #2a6b3a;
  }
  .inv-copy-btn:hover { background: #1c6b33; }

  .inv-close-btn {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .inv-close-btn:hover { border-color: var(--text-mid); color: var(--text-mid); }

  .copy-toast {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent-buy);
    text-align: center;
    margin-top: 8px;
    height: 16px;
    letter-spacing: 1px;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">
      <h1>// TRADER TERMINAL</h1>
      <p>DayZ · Economy Interface</p>
    </div>
    <div class="balance-box">
      <div class="balance-label">Net Balance</div>
      <div class="balance-amount zero" id="balanceDisplay">$0</div>
      <button class="balance-reset" onclick="resetBalance()">RESET</button>
    </div>
  </div>

  <div class="mode-toggle">
    <button class="toggle-btn active-buy" id="buyToggle" onclick="setMode('buy')">▼ BUY</button>
    <button class="toggle-btn" id="sellToggle" onclick="setMode('sell')">▲ SELL</button>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search items...">
    <select id="categoryFilter">
      <option value="" selected>— Select a Category —</option>
      <option value="pistol">Pistols</option>
      <option value="smg">SMGs</option>
      <option value="rifle">Rifles</option>
      <option value="shotgun">Shotguns</option>
      <option value="special">Special / Launchers</option>
      <option value="explosives">Explosives</option>
      <option value="melee">Melee</option>
      <option value="ammo">Ammo & Magazines</option>
      <option value="attachment">Optics & Attachments</option>
      <option value="armor">Armor & Helmets</option>
      <option value="clothing">Clothing & NBC</option>
      <option value="backpack">Backpacks</option>
      <option value="vehicle">Vehicles</option>
      <option value="vehiclepart">Vehicle Parts</option>
      <option value="repair">Repair Items</option>
      <option value="medical">Medical</option>
      <option value="tool">Tools</option>
      <option value="misc">Building & Storage</option>
      <option value="key">Keys</option>
      <option value="all">— All Items —</option>
    </select>
  </div>

  <div id="itemList"></div>

  <div class="log-section">
    <div class="log-header">
      <span>Transaction Log</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="invoice-btn" onclick="openInvoice()">📋 INVOICE</button>
        <button class="log-clear" onclick="clearLog()">CLEAR</button>
      </div>
    </div>
    <div id="transactionLog"><div class="empty-log">// no transactions yet</div></div>
  </div>
</div>

<!-- Invoice Modal -->
<div class="modal-overlay" id="invoiceModal">
  <div class="modal">
    <button class="modal-close" onclick="closeInvoice()">✕</button>
    <div class="invoice-header">
      <div class="invoice-title">// TRADER INVOICE</div>
      <div class="invoice-meta" id="invoiceMeta"></div>
    </div>
    <div class="invoice-section-label">Transactions</div>
    <div id="invoiceRows"></div>
    <div class="invoice-total">
      <span style="color:var(--text-dim);font-size:12px;letter-spacing:2px;">NET BALANCE</span>
      <span id="invoiceTotalAmt"></span>
    </div>
    <div class="invoice-actions">
      <button class="inv-action-btn inv-copy-btn" onclick="copyInvoice()">⎘ COPY TEXT</button>
      <button class="inv-action-btn inv-close-btn" onclick="closeInvoice()">CLOSE</button>
    </div>
    <div class="copy-toast" id="copyToast"></div>
  </div>
</div>

function formatBalance(val) {
  const abs = Math.abs(val);
  return (val < 0 ? '-$' : '$') + abs.toLocaleString();
}

function updateBalanceDisplay() {
  const el = document.getElementById('balanceDisplay');
  el.textContent = formatBalance(playerBalance);
  el.className = 'balance-amount ' + (playerBalance > 0 ? 'positive' : playerBalance < 0 ? 'negative' : 'zero');
}

function resetBalance() {
  playerBalance = 0;
  updateBalanceDisplay();
}

function setMode(m) {
  mode = m;
  document.getElementById('buyToggle').className = 'toggle-btn' + (m === 'buy' ? ' active-buy' : '');
  document.getElementById('sellToggle').className = 'toggle-btn' + (m === 'sell' ? ' active-sell' : '');
  renderItems();
}

function addLog(name, type, amount) {
  const time = new Date().toLocaleTimeString('en-CA', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
  log.unshift({name, type, amount, time});
  renderLog();
}

function renderLog() {
  const el = document.getElementById('transactionLog');
  if (log.length === 0) {
    el.innerHTML = '<div class="empty-log">// no transactions yet</div>';
    return;
  }
  el.innerHTML = log.map(e => `
    <div class="log-entry">
      <span>[${e.time}] <span class="log-${e.type}">${e.type.toUpperCase()}</span> · ${e.name}</span>
      <span class="log-${e.type}">${e.type === 'buy' ? '-' : '+'}$${e.amount.toLocaleString()}</span>
    </div>
  `).join('');
}

function clearLog() {
  log = [];
  renderLog();
}

function doTransaction(name) {
  const item = items[name];
  if (mode === 'buy') {
    playerBalance -= item.buy;
    addLog(name, 'buy', item.buy);
  } else {
    playerBalance += item.sell;
    addLog(name, 'sell', item.sell);
  }
  updateBalanceDisplay();
}

function renderItems() {
  const searchTerm = document.getElementById('search').value.toLowerCase();
  const filterCat = document.getElementById('categoryFilter').value;
  const isBuy = mode === 'buy';

  if (!filterCat && !searchTerm) {
    document.getElementById('itemList').innerHTML = `
      <div style="border:1px solid var(--border);border-radius:8px;">
        <div style="font-family:var(--mono);font-size:12px;color:var(--text-dim);padding:32px;text-align:center;letter-spacing:2px;line-height:2;">
          // SELECT A CATEGORY ABOVE<br>
          <span style="font-size:10px;color:var(--text-dim);opacity:0.6;">or search for an item by name</span>
        </div>
      </div>`;
    return;
  }

  const filtered = Object.entries(items).filter(([name, data]) =>
    (filterCat === 'all' || filterCat === '' || data.category === filterCat) &&
    name.toLowerCase().includes(searchTerm)
  );

  if (filtered.length === 0) {
    document.getElementById('itemList').innerHTML = `
      <div style="border:1px solid var(--border);border-radius:8px;">
        <div class="no-results">// no items found</div>
      </div>`;
    return;
  }

  const rows = filtered.map(([name, data]) => `
    <div class="traderItem">
      <div>
        <div class="item-name">${name}</div>
        <div class="item-category">${data.category}</div>
      </div>
      <div class="item-price ${isBuy ? 'buy-price' : 'sell-price'}">
        $${(isBuy ? data.buy : data.sell).toLocaleString()}
      </div>
      <button class="action-btn ${isBuy ? 'buy-btn' : 'sell-btn'}" onclick="doTransaction('${name}')">
        ${isBuy ? '▼ BUY' : '▲ SELL'}
      </button>
    </div>
  `).join('');

  document.getElementById('itemList').innerHTML = `
    <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;">
      <div class="list-header">
        <span>Item</span>
        <span>${isBuy ? 'Buy Price' : 'Sell Price'}</span>
        <span>Action</span>
      </div>
      ${rows}
    </div>`;
}

function openInvoice() {
  if (log.length === 0) {
    alert('No transactions to invoice yet.');
    return;
  }

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-CA', {year:'numeric', month:'long', day:'numeric'});
  const timeStr = now.toLocaleTimeString('en-CA', {hour:'2-digit', minute:'2-digit', hour12:false});

  document.getElementById('invoiceMeta').textContent = `Generated: ${dateStr} at ${timeStr}`;

  // Build rows (log is newest first, show oldest first in invoice)
  const ordered = [...log].reverse();
  document.getElementById('invoiceRows').innerHTML = ordered.map(e => `
    <div class="invoice-row">
      <span>[${e.time}] <span class="inv-${e.type}">${e.type.toUpperCase()}</span> · ${e.name}</span>
      <span class="inv-${e.type}">${e.type === 'buy' ? '-' : '+'}$${e.amount.toLocaleString()}</span>
    </div>
  `).join('');

  const totalEl = document.getElementById('invoiceTotalAmt');
  totalEl.textContent = formatBalance(playerBalance);
  totalEl.style.color = playerBalance > 0 ? 'var(--accent-buy)' : playerBalance < 0 ? 'var(--accent-sell)' : 'var(--text-dim)';

  document.getElementById('invoiceModal').classList.add('open');
}

function closeInvoice() {
  document.getElementById('invoiceModal').classList.remove('open');
}

function copyInvoice() {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-CA', {year:'numeric', month:'long', day:'numeric'});
  const timeStr = now.toLocaleTimeString('en-CA', {hour:'2-digit', minute:'2-digit', hour12:false});

  const ordered = [...log].reverse();
  const lines = [
    '// DAYZ TRADER INVOICE',
    `Generated: ${dateStr} at ${timeStr}`,
    '─'.repeat(40),
    ...ordered.map(e => {
      const sign = e.type === 'buy' ? '-' : '+';
      return `[${e.time}] ${e.type.toUpperCase().padEnd(4)} · ${e.name.padEnd(24)} ${sign}$${e.amount.toLocaleString()}`;
    }),
    '─'.repeat(40),
    `NET BALANCE: ${formatBalance(playerBalance)}`,
  ];

  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const toast = document.getElementById('copyToast');
    toast.textContent = '// copied to clipboard';
    setTimeout(() => { toast.textContent = ''; }, 2500);
  });
}

// Close modal on overlay click
document.getElementById('invoiceModal').addEventListener('click', function(e) {
  if (e.target === this) closeInvoice();
});


document.getElementById('categoryFilter').addEventListener('change', renderItems);

updateBalanceDisplay();
renderItems();
</script>
